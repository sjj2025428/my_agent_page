<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLP-1全球价格查询智能体</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        p {
            color: #7f8c8d;
            font-size: 18px;
        }
    </style>
    <!-- 改用你提供的最新SDK地址，增加加载容错 -->
    <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.19/libs/cn/index.js"></script>
</head>
<body>
    <h1>欢迎使用 GLP-1 全球价格查询智能体</h1>
    <p>点击右下角的聊天图标，即可开始对话。</p>

    <script>
        // 等待页面完全加载后初始化，避免加载顺序问题
        window.addEventListener('load', function() {
            // 检查SDK是否加载成功
            if (typeof CozeWebSDK === 'undefined') {
                alert('Coze SDK加载失败，请检查网络或刷新页面！');
                console.error('CozeWebSDK 未定义，SDK加载失败');
                return;
            }

            try {
                // 初始化简化版SDK（使用你提供的配置）
                new CozeWebSDK.WebChatClient({
                    config: {
                        bot_id: '7610382129834688512', // 你的智能体ID
                    },
                    componentProps: {
                        title: 'GLP-1价格查询智能体', // 自定义聊天框标题
                    },
                    auth: {
                        type: 'token',
                        // 替换为你完整的token（去掉********）
                        token: 'cztei_losdxvLzbUwfkv4YPbK9DtmJnXuNQuvLPOpeZGLu31PsrChvQaDJQU1dzzHuQfv7g',
                        onRefreshToken: function () {
                            // token过期时返回新的token（暂时用同一个）
                            return 'cztei_losdxvLzbUwfkv4YPbK9DtmJnXuNQuvLPOpeZGLu31PsrChvQaDJQU1dzzHuQfv7g';
                        }
                    },
                    // 补充关键UI配置，确保悬浮球显示
                    ui: {
                        asstBtn: {
                            isNeed: true
                        }
                    }
                });
                console.log('Coze SDK 初始化成功！');
            } catch (error) {
                alert(`聊天框初始化失败：${error.message}`);
                console.error('初始化报错：', error);
            }
        });
    </script>
</body>
</html>
