<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLP-1价格查询助手</title>
    <style>
        /* 隐藏页面所有默认内容，只留聊天悬浮球 */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* 防止页面滚动 */
        }
        /* 可选：自定义悬浮球样式（如需调整头像大小/位置） */
        .coze-asst-btn {
            width: 60px !important;
            height: 60px !important;
            bottom: 30px !important;
            right: 30px !important;
        }
    </style>
    <!-- 引入扣子SDK -->
    <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.19/libs/cn/index.js"></script>
</head>
<body>
    <script>
        window.addEventListener('load', function() {
            if (typeof CozeWebSDK === 'undefined') {
                alert('SDK加载失败，请刷新页面！');
                return;
            }

            try {
                new CozeWebSDK.WebChatClient({
                    config: {
                        bot_id: '7610382129834688512',
                        // 核心配置：隐藏思考过程
                        show_thinking: false, // 关闭思考中状态显示
                        show_loading: false    // 关闭加载动画（可选）
                    },
                    componentProps: {
                        title: 'GLP-1价格查询助手',
                        // 隐藏聊天框内的多余元素
                        showHeader: true,  // 保留标题栏（可改为false完全隐藏）
                        showFooter: false  // 隐藏底部Powered by文字
                    },
                    auth: {
                        type: 'token',
                        token: 'cztei_losdxvLzbUwfkv4YPbK9DtmJnXuNQuvLPOpeZGLu31PsrChvQaDJQU1dzzHuQfv7g',
                        onRefreshToken: function () {
                            return 'cztei_losdxvLzbUwfkv4YPbK9DtmJnXuNQuvLPOpeZGLu31PsrChvQaDJQU1dzzHuQfv7g';
                        }
                    },
                    ui: {
                        // 强制显示悬浮球，隐藏其他UI
                        asstBtn: {
                            isNeed: true,
                            // 自定义悬浮球图标（可选，替换为你的头像）
                            // icon: 'https://你的头像地址.png'
                        },
                        base: {
                            zIndex: 9999, // 确保悬浮球在最顶层
                            layout: 'pc'
                        },
                        chatBot: {
                            width: 420, // 聊天框宽度（可调整）
                            height: 600, // 聊天框高度（可调整）
                            uploadable: false, // 关闭文件上传（可选）
                            // 隐藏思考过程的额外配置
                            showTyping: false // 关闭“正在输入”提示
                        }
                    },
                    // 消息拦截：过滤思考过程相关内容（双重保障）
                    onMessage: function(msg) {
                        // 过滤掉思考中/加载中的消息
                        if (msg.type === 'thinking' || msg.content?.type === 'loading') {
                            return false; // 不显示该消息
                        }
                        return true;
                    }
                });
            } catch (error) {
                alert(`初始化失败：${error.message}`);
            }
        });
    </script>
</body>
</html>
